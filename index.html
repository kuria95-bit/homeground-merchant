<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homeground Merchants KE | Prime Plots, Apartments & Investments</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #2f3fa4;
        --green: #16a34a;
        --dark: #111827;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        font-family: 'Roboto', sans-serif;
        background: #f4f6fb;
        line-height: 1.6;
    }

    header { background: var(--primary); color: white; padding: 16px 15px; text-align: center; font-size: 1.35rem; font-weight: 700; }

    .hero {
        background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), url('https://images.mansionglobal.com/im-446105?width=1920') center/cover;
        color: white; text-align: center; padding: 100px 15px 80px;
    }
    .hero h1 { font-family: 'Montserrat', sans-serif; font-size: clamp(2rem, 7vw, 2.8rem); margin-bottom: 10px; }
    .hero p { font-size: 1.05rem; }

    .search { text-align: center; padding: 20px 15px; background: white; }
    .search input {
        width: 95%; max-width: 500px; padding: 14px 18px; border: 2px solid #ddd;
        border-radius: 50px; font-size: 1.05rem; outline: none;
    }

    .filters {
        text-align: center; padding: 18px 10px; background: white;
        display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
    }
    .filters button {
        padding: 10px 18px; border: none; background: var(--primary); color: white;
        border-radius: 50px; cursor: pointer; font-size: 0.95rem;
    }
    .filters button.active, .filters button:hover { background: var(--green); }

    .grid {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px; padding: 20px 15px; max-width: 1400px; margin: 0 auto;
    }

    .card {
        border-radius: 14px; overflow: hidden; background: white;
        box-shadow: 0 6px 20px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s;
    }
    .card:hover { transform: translateY(-6px); box-shadow: 0 12px 25px rgba(0,0,0,0.15); }

    .plot { border-top: 7px solid #16a34a; }
    .apartment { border-top: 7px solid #111827; }
    .commercial { border-top: 7px solid #2f3fa4; }

    .card img { width: 100%; height: 200px; object-fit: cover; }

    .content { padding: 16px; }
    .location { font-family: 'Montserrat', sans-serif; font-size: 1.15rem; font-weight: 700; color: #222; }
    .price { font-size: 1.65rem; color: var(--green); font-weight: 700; margin: 8px 0; }

    .badge {
        position: absolute; top: 12px; left: 12px; background: #f59e0b; color: white;
        padding: 5px 12px; font-weight: bold; border-radius: 6px; font-size: 0.85rem;
    }

    .btn {
        display: block; width: 100%; padding: 12px; margin: 8px 0;
        border-radius: 8px; text-decoration: none; font-weight: 600; text-align: center;
    }
    .whatsapp { background: #25d366; color: white; }
    .call { background: var(--primary); color: white; }
    .more-details { 
        background: #f59e0b; 
        color: white; 
        font-weight: 700; 
        font-size: 1.05rem;
    }

    /* ==================== MODAL (POPUP) ==================== */
    .modal {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;
        padding: 15px;
    }
    .modal-content {
        background: white; max-width: 500px; width: 100%; border-radius: 16px;
        overflow: hidden; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .modal-img { width: 100%; height: 260px; object-fit: cover; }
    .modal-body { padding: 20px; }
    .modal-title { font-family: 'Montserrat', sans-serif; font-size: 1.5rem; margin-bottom: 8px; }
    .modal-location { font-size: 1.1rem; color: #555; margin-bottom: 10px; }
    .modal-price { font-size: 2rem; color: var(--green); font-weight: 700; margin: 10px 0; }
    .modal-details { font-size: 1.05rem; line-height: 1.7; color: #333; margin: 15px 0; }

    .close-btn {
        position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6);
        color: white; width: 35px; height: 35px; border-radius: 50%; display: flex;
        align-items: center; justify-content: center; font-size: 1.6rem; cursor: pointer;
        z-index: 10;
    }

    @media (max-width: 380px) {
        .grid { gap: 18px; padding: 15px 10px; }
        .card img { height: 180px; }
    }
</style>
</head>
<body>

<header>HOMEGROUND MERCHANTS KE</header>

<section class="hero">
    <h1>Prime Plots • Apartments • Investment Deals</h1>
    <p>Verified Titles | High ROI | Trusted Property Experts in Kenya</p>
</section>

<div class="search">
    <input type="text" id="search" placeholder="🔍 Search by location..." onkeyup="searchProps()">
</div>

<div class="filters">
    <button onclick="filter('all')" class="active" id="btn-all">All</button>
    <button onclick="filter('plot')" id="btn-plot">Plots</button>
    <button onclick="filter('apartment')" id="btn-apartment">Apartments</button>
    <button onclick="filter('commercial')" id="btn-commercial">Commercial</button>
</div>

<div id="grid" class="grid"></div>

<footer>
    📞 <strong>0724 154 316</strong><br>
    <a href="https://wa.me/254724154316" target="_blank" style="color:#25d366; text-decoration:none;">
        💬 WhatsApp Us for Instant Deals
    </a>
</footer>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <div class="close-btn" onclick="closeModal()">×</div>
        <img id="modal-image" class="modal-img" src="" alt="">
        <div class="modal-body">
            <div id="modal-title" class="modal-title"></div>
            <div id="modal-location" class="modal-location"></div>
            <div id="modal-price" class="modal-price"></div>
            <div id="modal-details" class="modal-details"></div>

            <a id="modal-whatsapp" class="btn whatsapp" href="#" target="_blank">💬 WhatsApp</a>
            <a id="modal-call" class="btn call" href="tel:+254724154316">📞 Call Now</a>
        </div>
    </div>
</div>

<script>
const properties = [
    {
        title: "Prime Plot",
        location: "Ruaka behind Loftel",
        price: "KES 13M",
        type: "plot",
        image: "https://i.ibb.co/Q3gzf0Yy/e384a007.jpg",
        featured: true,
        details: "Ideal for rentals or Airbnb. Ready title, water and electricity available. Perfect for immediate development."
    },
    {
        title: "Rental Apartment",
        location: "Joska Kangundo Road",
        price: "KES 11M",
        type: "apartment",
        image: "https://i.ibb.co/DDvBCMwL/a5d0d9ca.jpg",
        details: "Income KES 80,000 per month. 4 units fully occupied. Very good return on investment."
    },
    {
        title: "Commercial Building",
        location: "Thika Road",
        price: "KES 380M",
        type: "commercial",
        image: "https://i.ibb.co/0jmqstSt/b2ccfd04.jpg",
        details: "Income KES 3M monthly. Prime location with high foot traffic. Excellent for long-term investment."
    }
];

let currentFilter = "all";

function render(list) {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    list.forEach((p, index) => {
        const whatsappMsg = encodeURIComponent(`Hello Homeground Merchants,\n\nI'm interested in:\n📌 ${p.title}\n📍 ${p.location}\n💰 ${p.price}\n\nKindly share more details.`);

        grid.innerHTML += `
        <div class="card ${p.type}" onclick="showModal(${index})">
            ${p.featured ? `<div class="badge">🔥 HOT DEAL</div>` : ""}
            <img src="${p.image}" alt="${p.title}">
            <div class="content">
                <div class="location">${p.location}</div>
                <div class="price">${p.price}</div>
                <p>${p.details}</p>
                
                <a class="btn more-details" onclick="event.stopImmediatePropagation(); showModal(${index})">
                    More Details & Contact
                </a>
                <a class="btn whatsapp" href="https://wa.me/254724154316?text=${whatsappMsg}" target="_blank" onclick="event.stopImmediatePropagation()">💬 WhatsApp</a>
                <a class="btn call" href="tel:+254724154316" onclick="event.stopImmediatePropagation()">📞 Call Now</a>
            </div>
        </div>`;
    });
}

function showModal(index) {
    const p = properties[index];
    const whatsappMsg = encodeURIComponent(`Hello Homeground Merchants,\n\nI'm interested in:\n📌 ${p.title}\n📍 ${p.location}\n💰 ${p.price}\n\nKindly share more details.`);

    document.getElementById("modal-image").src = p.image;
    document.getElementById("modal-title").textContent = p.title;
    document.getElementById("modal-location").textContent = p.location;
    document.getElementById("modal-price").textContent = p.price;
    document.getElementById("modal-details").innerHTML = p.details.replace(/\n/g, '<br>');

    document.getElementById("modal-whatsapp").href = `https://wa.me/254724154316?text=${whatsappMsg}`;

    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

document.getElementById("modal").addEventListener("click", function(e) {
    if (e.target.id === "modal") closeModal();
});

function filter(type) {
    currentFilter = type;
    document.querySelectorAll('.filters button').forEach(btn => {
        btn.classList.toggle('active', 
            (type === 'all' && btn.id === 'btn-all') ||
            (type === 'plot' && btn.id === 'btn-plot') ||
            (type === 'apartment' && btn.id === 'btn-apartment') ||
            (type === 'commercial' && btn.id === 'btn-commercial')
        );
    });

    const filtered = properties.filter(p => type === "all" || p.type === type);
    render(filtered);
}

function searchProps() {
    const val = document.getElementById("search").value.toLowerCase().trim();
    const filtered = properties.filter(p => 
        (currentFilter === "all" || p.type === currentFilter) &&
        (p.location.toLowerCase().includes(val) || p.title.toLowerCase().includes(val))
    );
    render(filtered);
}

render(properties);
</script>
</body>
</html>
